<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E.A. Elite Trading Group</title>
<meta name="description" content="E.A. Elite Trading Group — International trading conglomerate across Asia.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%231B2A4A' stroke='%23C5A55A' stroke-width='2'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='serif' font-size='14' font-weight='bold' fill='%23C5A55A'%3EEA%3C/text%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1B2A4A;--navy-dark:#0A0F1C;--navy-mid:#111B2E;
  --gold:#C5A55A;--gold-light:#D4BA7A;--gold-pale:#F5EDD8;
  --cream:#FAF7F0;--text:#2C3E50;--text-light:#6B7B8D;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--navy-dark);color:#fff;font-family:'DM Sans',sans-serif;overflow-x:hidden}

/* ══════════════════════════════════════ */
/*  SPLIT LAYOUT — Left scroll, Right 3D */
/* ══════════════════════════════════════ */
.layout{display:flex;min-height:100vh}

/* LEFT: scrollable content */
.content-rail{
  width:50%;position:relative;z-index:10;
  background:linear-gradient(180deg,var(--navy-dark) 0%,var(--navy-mid) 100%);
  border-right:1px solid rgba(197,165,90,0.06);
}

/* RIGHT: fixed 3D globe */
.globe-rail{
  width:50%;position:fixed;top:0;right:0;height:100vh;z-index:1;
  cursor:grab;overflow:hidden;
  background:radial-gradient(ellipse at 50% 50%,rgba(27,42,74,0.3) 0%,var(--navy-dark) 70%);
}
.globe-rail:active{cursor:grabbing}
#globe-canvas{width:100%;height:100%}

/* City hover tooltip */
.city-tooltip{
  position:fixed;z-index:50;pointer-events:none;
  background:rgba(10,15,28,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(197,165,90,0.25);border-radius:10px;
  padding:12px 16px;min-width:180px;
  opacity:0;transform:translateY(8px);
  transition:opacity 0.25s ease,transform 0.25s ease;
}
.city-tooltip.show{opacity:1;transform:translateY(0)}
.city-tooltip .ct-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:3px}
.city-tooltip .ct-role{font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;letter-spacing:0.5px;margin-bottom:6px}
.city-tooltip .ct-desc{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5}
.city-tooltip .ct-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

/* Globe legend — compact */
.globe-legend{
  position:absolute;bottom:20px;left:20px;z-index:20;
  background:rgba(10,15,28,0.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(197,165,90,0.1);border-radius:10px;
  padding:10px 14px;max-width:200px;
  opacity:0.8;transition:opacity 0.3s;
}
.globe-legend:hover{opacity:1}
.gl-title{font-size:8px;color:var(--gold);font-weight:700;letter-spacing:2px;margin-bottom:7px}
.gl-items{display:flex;flex-wrap:wrap;gap:3px 10px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,0.04)}
.gl-arcs{display:flex;flex-wrap:wrap;gap:3px 10px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.04)}
.gl-item{display:flex;align-items:center;gap:5px;font-size:9px;color:rgba(255,255,255,0.45)}
.gl-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gl-line{width:12px;height:2px;border-radius:1px;flex-shrink:0}
.gl-hq{color:var(--gold);font-size:8px;margin-left:1px}
.gl-hint{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.3px}

/* Back from zoom button */
.zoom-back{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:25;
  display:none;align-items:center;gap:6px;
  background:rgba(10,15,28,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(197,165,90,0.25);border-radius:10px;
  padding:10px 20px;cursor:pointer;transition:all 0.3s;color:var(--gold);font-size:12px;font-weight:600;
  font-family:'DM Sans',sans-serif;letter-spacing:0.5px;
}
.zoom-back.show{display:flex}
.zoom-back:hover{background:rgba(197,165,90,0.15);border-color:rgba(197,165,90,0.5)}
.zoom-back svg{width:14px;height:14px;fill:var(--gold)}

/* ══════════════════════════════════════ */
/*  SECTION BLOCKS                       */
/* ══════════════════════════════════════ */
.section-block{
  min-height:100vh;padding:100px 48px 80px 48px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;
  border-bottom:1px solid rgba(197,165,90,0.04);
}
.section-block::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(197,165,90,0.12),transparent);
}

/* Fade-in animation */
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s cubic-bezier(.16,1,.3,1),transform 0.7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:0.1s}
.reveal-d2{transition-delay:0.2s}
.reveal-d3{transition-delay:0.3s}
.reveal-d4{transition-delay:0.4s}

/* ══════════════════════════════════════ */
/*  TYPOGRAPHY                           */
/* ══════════════════════════════════════ */
.tag{display:inline-flex;align-items:center;gap:10px;color:var(--gold);font-size:11px;letter-spacing:3px;font-weight:600;margin-bottom:18px}
.tag::before{content:'';width:28px;height:1px;background:var(--gold)}
.heading-hero{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,4.5vw,64px);font-weight:700;line-height:1.06;margin-bottom:22px}
.heading-section{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,3vw,44px);font-weight:700;line-height:1.12;margin-bottom:18px}
.gold{color:var(--gold)}
.body-text{color:rgba(255,255,255,0.55);font-size:15px;line-height:1.78;margin-bottom:28px;max-width:480px}

/* ══════════════════════════════════════ */
/*  BUTTONS                              */
/* ══════════════════════════════════════ */
.btn-gold{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy-dark);
  border:none;padding:14px 30px;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 20px rgba(197,165,90,0.3);transition:all 0.3s
}
.btn-gold:hover{box-shadow:0 8px 35px rgba(197,165,90,0.5);transform:translateY(-2px)}
.btn-ghost{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.03);color:var(--gold-light);
  border:1px solid rgba(197,165,90,0.2);padding:14px 30px;border-radius:8px;
  font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.3s
}
.btn-ghost:hover{background:rgba(197,165,90,0.06);border-color:rgba(197,165,90,0.35)}

/* ══════════════════════════════════════ */
/*  CARDS                                */
/* ══════════════════════════════════════ */
.mini-card{
  background:rgba(255,255,255,0.03);border:1px solid rgba(197,165,90,0.07);
  border-radius:12px;padding:18px;transition:all 0.35s
}
.mini-card:hover{background:rgba(255,255,255,0.06);border-color:rgba(197,165,90,0.18);transform:translateY(-3px)}

/* ══════════════════════════════════════ */
/*  STATS GRID                           */
/* ══════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:28px}
.stat-box{text-align:center;padding:16px 8px;background:rgba(255,255,255,0.025);border:1px solid rgba(197,165,90,0.05);border-radius:10px}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(197,165,90,0.25)}
.stat-l{font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;letter-spacing:0.5px}

/* ══════════════════════════════════════ */
/*  NAV                                  */
/* ══════════════════════════════════════ */
.topnav{
  position:fixed;top:0;left:0;width:50%;z-index:100;padding:0 48px;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,15,28,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(197,165,90,0.06);transition:all 0.4s
}
.topnav.scrolled{background:rgba(10,15,28,0.95)}
.nav-brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.nav-brand-circle{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center}
.nav-brand-circle span{color:var(--gold);font-weight:800;font-size:11px;font-family:'Cormorant Garamond',serif}
.nav-items{display:flex;gap:2px;align-items:center}
.nav-items button{background:none;border:none;color:rgba(255,255,255,0.4);font-size:11px;padding:7px 10px;cursor:pointer;border-radius:5px;font-family:'DM Sans',sans-serif;transition:all 0.3s;white-space:nowrap}
.nav-items button.active{color:var(--gold);font-weight:600}
.nav-items button:hover{color:rgba(255,255,255,0.7)}
.lang-sw{display:flex;background:rgba(255,255,255,0.05);border-radius:16px;border:1px solid rgba(197,165,90,0.12);overflow:hidden}
.lang-sw button{border:none;padding:5px 12px;font-size:10px;font-weight:700;cursor:pointer;transition:all 0.3s}
.lang-sw button.on{background:var(--gold);color:var(--navy-dark)}
.lang-sw button:not(.on){background:transparent;color:rgba(255,255,255,0.35)}

/* Scroll progress */
.scroll-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light));z-index:200;width:0%;transition:width 0.05s linear}

/* Section dots */
.sec-dots{position:fixed;left:24px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:10px}
.sec-dots button{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(197,165,90,0.25);background:transparent;cursor:pointer;transition:all 0.4s;padding:0}
.sec-dots button.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(197,165,90,0.4);transform:scale(1.4)}

/* Globe section label */
.globe-section-label{display:none}

/* Scroll hint */
.scroll-cue{
  position:fixed;bottom:28px;left:25%;transform:translateX(-50%);z-index:50;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:opacity 0.5s;
}
.scroll-cue.gone{opacity:0;pointer-events:none}
.scroll-cue span{color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:2px}
.mouse-i{width:20px;height:32px;border:1.5px solid rgba(197,165,90,0.35);border-radius:10px;position:relative}
.mouse-i::after{content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:2px;height:7px;background:var(--gold);border-radius:2px;animation:mScroll 1.8s ease-in-out infinite}
@keyframes mScroll{0%{opacity:1;top:7px}100%{opacity:0;top:17px}}

/* ══════════════════════════════════════ */
/*  FOOTER                               */
/* ══════════════════════════════════════ */
.site-footer{padding:40px 48px 24px;border-top:1px solid rgba(197,165,90,0.06);background:rgba(10,15,28,0.5)}

/* ══════════════════════════════════════ */
/*  RESPONSIVE                           */
/* ══════════════════════════════════════ */
@media(max-width:900px){
  .layout{flex-direction:column}
  .content-rail{width:100%}
  .globe-rail{width:100%;position:relative;height:50vh;border-right:none;border-bottom:1px solid rgba(197,165,90,0.06)}
  .topnav{width:100%}
  .section-block{min-height:auto;padding:60px 24px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .nav-items{display:none}
  .sec-dots{display:none}
  .scroll-cue{left:50%}
  .globe-section-label{display:none}
  .globe-legend{bottom:10px;left:10px;max-width:170px;padding:8px 10px}
}
</style>
</head>

  renderer.setSize(box.clientWidth,box.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x000000,0);box.appendChild(renderer.domElement);
  globeGroup=new THREE.Group();globeGroup.rotation.y=-3.33;globeGroup.rotation.x=0.14;scene.add(globeGroup);
  scene.add(new THREE.AmbientLight(0xffffff,0.35));
  var dl=new THREE.DirectionalLight(0xC5A55A,1);dl.position.set(5,3,5);scene.add(dl);
  var dl2=new THREE.DirectionalLight(0x6B5FCC,0.4);dl2.position.set(-5,2,-3);scene.add(dl2);
  var pl1=new THREE.PointLight(0xC5A55A,0.5,15);pl1.position.set(3,2,4);scene.add(pl1);

  // ── DENSER LAND DOTS (step 1.8 instead of 2.6) ──
  var dp=[];for(var la=-80;la<=80;la+=1.8)for(var lo=-180;lo<180;lo+=1.8)if(isL(la,lo)){var v=ll(la,lo,R);dp.push(v.x,v.y,v.z)}
  var dg=new THREE.BufferGeometry();dg.setAttribute('position',new THREE.Float32BufferAttribute(dp,3));
  landDots=new THREE.Points(dg,new THREE.PointsMaterial({color:0xC5A55A,size:0.018,transparent:true,opacity:0.8,sizeAttenuation:true}));
  globeGroup.add(landDots);

  // ── DENSER OCEAN DOTS ──
  var op=[];for(var la2=-80;la2<=80;la2+=5)for(var lo2=-180;lo2<180;lo2+=5)if(!isL(la2,lo2)){var v2=ll(la2,lo2,R);op.push(v2.x,v2.y,v2.z)}
  var og=new THREE.BufferGeometry();og.setAttribute('position',new THREE.Float32BufferAttribute(op,3));
  globeGroup.add(new THREE.Points(og,new THREE.PointsMaterial({color:0x4A6FA5,size:0.006,transparent:true,opacity:0.12,sizeAttenuation:true})));

  // ── MORE GRATICULE LINES ──
  [-75,-60,-45,-30,-15,0,15,30,45,60,75].forEach(function(la3){var pts=[];for(var lo3=0;lo3<=360;lo3+=2)pts.push(ll(la3,lo3-180,R+0.001));globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x4A6FA5,transparent:true,opacity:0.05})))});
  [-150,-120,-90,-60,-30,0,30,60,90,120,150,180].forEach(function(lo4){var pts=[];for(var la4=-80;la4<=80;la4+=2)pts.push(ll(la4,lo4,R+0.001));globeGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x4A6FA5,transparent:true,opacity:0.035})))});

  // ── WIREFRAME SPHERE for structure ──
  var wfGeo=new THREE.SphereGeometry(R*0.998,36,24);
  var wfMat=new THREE.MeshBasicMaterial({color:0x2A4066,wireframe:true,transparent:true,opacity:0.04});
  globeGroup.add(new THREE.Mesh(wfGeo,wfMat));

  // ── ATMOSPHERE GLOW (triple layer) ──
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.06,64,64),new THREE.MeshBasicMaterial({color:0x3A5C8A,transparent:true,opacity:0.06,side:THREE.BackSide})));
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.14,64,64),new THREE.MeshBasicMaterial({color:0xC5A55A,transparent:true,opacity:0.025,side:THREE.BackSide})));
  globeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(R*1.22,64,64),new THREE.MeshBasicMaterial({color:0x1A2744,transparent:true,opacity:0.04,side:THREE.BackSide})));

  // ── CITIES ──
  var cityCoords=[
    {la:13.75,lo:100.52,c:0xC5A55A,hq:1},
    {la:35.68,lo:139.69,c:0xFF6B6B},
    {la:1.35,lo:103.82,c:0x4ECDC4},
    {la:16.87,lo:96.19,c:0x45B7D1},
    {la:25.2,lo:55.27,c:0xF39C12},
    {la:31.23,lo:121.47,c:0x9B59B6}
  ];
  var cityDotMeshes=[];
  cityCoords.forEach(function(c,idx){
    var p=ll(c.la,c.lo,R);
    var hit=new THREE.Mesh(new THREE.SphereGeometry(0.07,16,16),new THREE.MeshBasicMaterial({transparent:true,opacity:0}));
    hit.position.copy(p);
    // Store raw position for dynamic zoom rotation computation
    hit.userData={idx:idx,c:c.c,hq:c.hq,px:p.x,py:p.y,pz:p.z};
    globeGroup.add(hit);cityDotMeshes.push(hit);
    var dot=new THREE.Mesh(new THREE.SphereGeometry(c.hq?0.04:0.028,16,16),new THREE.MeshBasicMaterial({color:c.c}));dot.position.copy(p);globeGroup.add(dot);
    var rn=new THREE.Mesh(new THREE.RingGeometry(0.035,0.055,32),new THREE.MeshBasicMaterial({color:c.c,transparent:true,opacity:0.7,side:THREE.DoubleSide}));rn.position.copy(p);rn.lookAt(0,0,0);globeGroup.add(rn);
    // Outer pulse for all cities (not just HQ)
    var pl=new THREE.Mesh(new THREE.RingGeometry(0.045,0.08,32),new THREE.MeshBasicMaterial({color:c.c,transparent:true,opacity:c.hq?0.3:0.15,side:THREE.DoubleSide}));pl.position.copy(p);pl.lookAt(0,0,0);globeGroup.add(pl);
    cityMeshes.push({pulse:pl,isPulse:1,hq:c.hq});
  });

  // ── THICKER ARCS ──
  [{f:0,t:1,c:0xC5A55A},{f:0,t:2,c:0xC5A55A},{f:0,t:3,c:0xD4BA7A},{f:0,t:4,c:0xF39C12},{f:0,t:5,c:0xC5A55A},{f:3,t:1,c:0x45B7D1},{f:3,t:4,c:0x45B7D1}].forEach(function(r){
    var s=ll(cityCoords[r.f].la,cityCoords[r.f].lo,R),e=ll(cityCoords[r.t].la,cityCoords[r.t].lo,R);
    var d=s.distanceTo(e),m=s.clone().add(e).multiplyScalar(0.5);m.normalize().multiplyScalar(R+d*0.35);
    var cv=new THREE.QuadraticBezierCurve3(s,m,e);
    var tb=new THREE.Mesh(new THREE.TubeGeometry(cv,64,0.006,8,false),new THREE.MeshBasicMaterial({color:r.c,transparent:true,opacity:0.22}));
    globeGroup.add(tb);arcTubes.push(tb);
    for(var i=0;i<4;i++){
      var pm=new THREE.Mesh(new THREE.SphereGeometry(0.016,8,8),new THREE.MeshBasicMaterial({color:r.c,transparent:true,opacity:0.9}));
      var gm=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),new THREE.MeshBasicMaterial({color:r.c,transparent:true,opacity:0.2}));
      globeGroup.add(pm);globeGroup.add(gm);
      tradeParts.push({m:pm,g:gm,cv:cv,pr:i/4,sp:0.09+Math.random()*0.07});
    }
  });

  // ── ORBITAL RINGS ──
  var o1=new THREE.Mesh(new THREE.TorusGeometry(R*1.3,0.003,16,200),new THREE.MeshBasicMaterial({color:0xC5A55A,transparent:true,opacity:0.08}));
  o1.rotation.x=Math.PI*0.52;o1.rotation.z=Math.PI*0.08;globeGroup.add(o1);
  var o2=new THREE.Mesh(new THREE.TorusGeometry(R*1.45,0.002,16,200),new THREE.MeshBasicMaterial({color:0x6B5FCC,transparent:true,opacity:0.04}));
  o2.rotation.x=Math.PI*0.3;o2.rotation.z=-Math.PI*0.12;globeGroup.add(o2);

  // ── MORE AMBIENT PARTICLES (60) ──
  for(var ai=0;ai<60;ai++){var sz=0.003+Math.random()*0.009;var mm=new THREE.Mesh(new THREE.SphereGeometry(sz,6,6),new THREE.MeshBasicMaterial({color:Math.random()>0.4?0xC5A55A:0x6B8EC2,transparent:true,opacity:0.08+Math.random()*0.2}));var aa=Math.random()*Math.PI*2,hh=-2+Math.random()*4,dd=R*1.2+Math.random()*1.3;mm.position.set(Math.cos(aa)*dd,hh,Math.sin(aa)*dd);globeGroup.add(mm);ambParts.push({m:mm,a:aa,h:hh,d:dd,sp:0.04+Math.random()*0.18,ys:0.03+Math.random()*0.08})}

  // ── DRAG ──
  var drag=0,px=0,py=0,urx=0,ury=0;
  var gr=document.querySelector('.globe-rail');
  gr.addEventListener('mousedown',function(e){if(zoomedCity)return;drag=1;px=e.clientX;py=e.clientY});
  window.addEventListener('mouseup',function(){drag=0});
  window.addEventListener('mousemove',function(e){if(!drag||zoomedCity)return;ury+=(e.clientX-px)*0.004;urx+=(e.clientY-py)*0.004;urx=Math.max(-1,Math.min(1,urx));px=e.clientX;py=e.clientY});
  gr.addEventListener('touchstart',function(e){if(zoomedCity)return;if(e.touches.length===1){drag=1;px=e.touches[0].clientX;py=e.touches[0].clientY}},{passive:true});
  window.addEventListener('touchend',function(){drag=0});
  window.addEventListener('touchmove',function(e){if(!drag||zoomedCity||e.touches.length!==1)return;ury+=(e.touches[0].clientX-px)*0.004;urx+=(e.touches[0].clientY-py)*0.004;urx=Math.max(-1,Math.min(1,urx));px=e.touches[0].clientX;py=e.touches[0].clientY},{passive:true});

  // ── RAYCASTER + CLICK-TO-ZOOM ──
  var raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
  var tooltip=document.getElementById('cityTooltip'),ctName=document.getElementById('ctName'),ctRole=document.getElementById('ctRole'),ctDesc=document.getElementById('ctDesc');
  var hoveredCity=null;
  var zoomedCity=false;
  var zoomedCityIdx=-1; // track which city is zoomed
  function colorHex(c){return'#'+new THREE.Color(c).getHexString()}

  // Helper: show tooltip for a city by index, positioned fixed in globe panel
  function showCityInfo(idx,fixedPos){
    var d=LD(),cn=d.cityNames[idx],ci=d.cities[idx],cc=cityCoords[idx];

    ctRole.textContent=ci.role;
    ctDesc.textContent=ci.desc;
    tooltip.classList.add('show');
    if(fixedPos){
      // Position at center-bottom of globe rail
      var rect=gr.getBoundingClientRect();

      tooltip.style.top=(rect.top+rect.height*0.62)+'px';
    }
  }
  function hideCityInfo(){
    hoveredCity=null;
    tooltip.classList.remove('show');
  }

  // Hover (only when NOT zoomed)
  gr.addEventListener('mousemove',function(e){
    if(zoomedCity)return; // no hover when zoomed — info already shown
    var rect=gr.getBoundingClientRect();
    mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;

      var ud=hits[0].object.userData,d=LD(),cn=d.cityNames[ud.idx];

  });
  gr.addEventListener('mouseleave',function(){if(!zoomedCity)hideCityInfo()});

  // ── CLICK: Zoom to city ──
  var autoRotAccum=0;
  gr.addEventListener('click',function(e){
    var rect=gr.getBoundingClientRect();
    mouse.x=((e.clientX-rect.left)/rect.width)*2-1;

      zoomedCityIdx=ud.idx;

      var cRx=Math.atan2(ud.py, Math.sqrt(ud.px*ud.px+ud.pz*ud.pz));

      while(cur.ry-cRy>Math.PI)cur.ry-=Math.PI*2;
      while(cur.ry-cRy<-Math.PI)cur.ry+=Math.PI*2;
      tar.ry=cRy; tar.rx=cRx; tar.cz=3.6; tar.cy=0;
      tar.aO=0.45; tar.pS=1.5; tar.lO=0.95;

    }
  });

  // ── BACK BUTTON: return to scroll-driven ──
  window._zoomBack=function(){
    cur.ry=cur.ry+ury+autoRotAccum;
    cur.rx=cur.rx+urx;
    ury=0; urx=0; autoRotAccum=0;
    zoomedCity=false;
    zoomedCityIdx=-1;
    gr.style.cursor='grab';
    hideCityInfo();
    document.getElementById('zoomBack').classList.remove('show');
    onScroll();
    // Normalize cur.ry toward new tar.ry for shortest path

  };

  // ── SCROLL KEYFRAMES ──
  var KF=[
    {ry:-3.33,rx:0.14,cy:0,cz:5.0,aO:0.22,pS:1.0,lO:0.80},
    {ry:-3.33,rx:0.12,cy:-0.1,cz:4.0,aO:0.14,pS:0.5,lO:0.90},
    {ry:-3.50,rx:0.18,cy:0,cz:4.6,aO:0.32,pS:1.2,lO:0.88},

  var cur={ry:KF[0].ry,rx:KF[0].rx,cy:KF[0].cy,cz:KF[0].cz,aO:KF[0].aO,pS:KF[0].pS,lO:KF[0].lO};
  var tar={ry:KF[0].ry,rx:KF[0].rx,cy:KF[0].cy,cz:KF[0].cz,aO:KF[0].aO,pS:KF[0].pS,lO:KF[0].lO};

  window._globeScroll=function(idx,prog){
    if(zoomedCity)return; // don't override when zoomed
    var a=KF[Math.min(idx,KF.length-1)],b=KF[Math.min(idx+1,KF.length-1)];
    tar={ry:a.ry+(b.ry-a.ry)*prog,rx:a.rx+(b.rx-a.rx)*prog,cy:a.cy+(b.cy-a.cy)*prog,cz:a.cz+(b.cz-a.cz)*prog,aO:a.aO+(b.aO-a.aO)*prog,pS:a.pS+(b.pS-a.pS)*prog,lO:a.lO+(b.lO-a.lO)*prog};
  };

  var clock=new THREE.Clock();

    requestAnimationFrame(animate);
    var t=clock.getElapsedTime(),dt=Math.min(clock.getDelta(),0.05),sm=zoomedCity?0.06:0.04;
    // Normalize ry to shortest path before lerping
    while(cur.ry-tar.ry>Math.PI)cur.ry-=Math.PI*2;
    while(cur.ry-tar.ry<-Math.PI)cur.ry+=Math.PI*2;
    cur.ry=lp(cur.ry,tar.ry,sm);cur.rx=lp(cur.rx,tar.rx,sm);cur.cz=lp(cur.cz,tar.cz,sm);cur.cy=lp(cur.cy,tar.cy,sm);
    cur.aO=lp(cur.aO,tar.aO,sm);cur.pS=lp(cur.pS,tar.pS,sm);cur.lO=lp(cur.lO,tar.lO,sm);

    camera.position.set(0,cur.cy,cur.cz);camera.lookAt(0,0,0);
    landDots.material.opacity=cur.lO;
    arcTubes.forEach(function(a){a.material.opacity=cur.aO});
    tradeParts.forEach(function(p){p.pr+=p.sp*dt*cur.pS;if(p.pr>1)p.pr-=1;var pos=p.cv.getPointAt(p.pr);p.m.position.copy(pos);p.g.position.copy(pos);p.m.material.opacity=Math.sin(p.pr*Math.PI)*0.9;p.g.material.opacity=Math.sin(p.pr*Math.PI)*0.2});
    cityMeshes.forEach(function(c){if(c.isPulse){var baseOp=c.hq?0.08:0.04;c.pulse.material.opacity=baseOp+Math.sin(t*3)*0.18;var s=1+Math.sin(t*2)*0.35;c.pulse.scale.set(s,s,s)}});
    ambParts.forEach(function(p){p.a+=p.sp*dt*0.3;p.m.position.x=Math.cos(p.a)*p.d;p.m.position.z=Math.sin(p.a)*p.d;p.m.position.y=p.h+Math.sin(t*p.ys+p.a)*0.2});
    o1.rotation.z+=0.0008;o2.rotation.z-=0.0005;

    renderer.render(scene,camera);
  })();
  window.addEventListener('resize',function(){camera.aspect=box.clientWidth/box.clientHeight;camera.updateProjectionMatrix();renderer.setSize(box.clientWidth,box.clientHeight)});
}

// ═══ SCROLL HANDLER ═══
function onScroll(){var sy=window.scrollY,dh=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('scrollBar').style.width=(Math.min(sy/dh,1)*100)+'%';document.getElementById('topnav').classList.toggle('scrolled',sy>50);document.getElementById('scrollCue').classList.toggle('gone',sy>80);var secs=LD().sections;var aidx=0,sprog=0;for(var i=secs.length-1;i>=0;i--){var el=document.getElementById(secs[i].id);if(!el)continue;var r=el.getBoundingClientRect();if(r.top<window.innerHeight*0.5){aidx=i;sprog=Math.max(0,Math.min(1,(-r.top+window.innerHeight*0.5)/el.offsetHeight));break}}
secs.forEach(function(s,i){var nb=document.getElementById('n-'+s.id),db=document.getElementById('d-'+s.id);if(nb)nb.className=i===aidx?'active':'';if(db)db.className=i===aidx?'on':''});
document.querySelectorAll('.reveal').forEach(function(el){var r=el.getBoundingClientRect();el.classList.toggle('visible',r.top<window.innerHeight*0.82&&r.bottom>0)});
var lbl=document.getElementById('globeLabel');if(lbl&&secs[aidx])lbl.textContent=secs[aidx].label||'';
if(window._globeScroll)window._globeScroll(aidx,sprog)}

// ═══ INIT ═══
buildPage();initGlobe();
window.addEventListener('scroll',onScroll,{passive:true});
window.addEventListener('resize',onScroll);
onScroll();
</script>
